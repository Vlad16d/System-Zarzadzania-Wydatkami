<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.expense {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

table {
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: left;
}

tr {
    border-bottom: 1px solid #eee;
}

.category-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 14px;
    border-bottom: 1px solid #eee;
}

.delete-btn {
/*    background: #ff7474;*/
    background: #FFEFD5;
/*    background: #ffe485; */
    border: none;
    color: white;
    padding: 2px 6px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #e60000;
}

#categoryList {
    max-width: 300px;
}

.fade {
    opacity: 0;
    transition: opacity 0.3s ease;
}

.fade.show {
    opacity: 1;
}

#logoutBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff5c5c;
}

#authWrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    background: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f') no-repeat center center;
    background-size: cover;
}

#authWrapper::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

#authBlock {
    width: 320px;
    text-align: center;
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
}

#authBlock input {
    width: 90%;
}

#authBlock button {
    width: 90%;
    margin-top: 10px;
}

#authBlock button:nth-child(6) {
    background: #3498db;
}

#authBlock button:nth-child(7) {
    background: #9b59b6;
}


#appTitle {
    position: absolute;
    top: 80px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 28px;
    font-weight: bold;
        letter-spacing: 1px;
}

</style>
</head>

<div id="authWrapper">
    <h1 id="appTitle">💸 Expense Tracker</h1>
    <div class="card" id="authBlock">
        <h2>🔐 Login / Registration</h2>

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Hasło">

        <label>
            <input type="checkbox" id="remember"> Zapamiętaj mnie
        </label>

        <br><br>

        <button onclick="login()">Logowanie</button>
        <button onclick="register()">Rejestracja</button>
    </div>
</div>

<div id="appBlock" style="display:none;">
    <div class="container">

    <h1>💸 Expense Tracker</h1>

    <div class="card">
    <h2>Dodaj wydatek</h2>
    <input id="amount" type="number" placeholder="Suma" min="0" step="0.01">
    <input id="date" type="date">
    <input id="desc" placeholder="Opis">
    <select id="category"></select>
    <button onclick="addExpense()">Dodaj</button>
    </div>

    <div class="card">
    <h2>Kategorie</h2>

    <input id="newCategory" placeholder="Nowa kategoria...">
    <button onclick="addCategory()">Dodaj</button>

    <ul id="categoryList"></ul>
    </div>

    <div class="card">
    <h2>Spis wydatków</h2>
    <button onclick="loadExpenses()">Refresh</button>
    <table border="1" width="100%" id="table">
        <thead>
            <tr>
                <th>Data</th>
                <th>Opis</th>
                <th>Suma</th>
                <th>Kategoria</th>
                <th>Działania</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
    </div>

    <div class="card">
    <h2>📊 Statystyki</h2>
    <canvas id="chart"></canvas>
    <canvas id="monthlyChart" style="margin-top:20px"></canvas>
    <input type="month" id="month">
    <button onclick="loadMonthlyStats()">Pokaż za miesiąc</button>
    <p id="monthlyResult"></p>
    </div>

    <div class="card">
    <h2>💰 Budget</h2>
    <input id="budget" placeholder="Limit">
    <button onclick="setBudget()">Ustaw</button>
    <p id="budgetInfo"></p>
    </div>

    <button id="logoutBtn" onclick="logout()" style="display:none;">
        Wyjście
    </button>

    </div>
</div>

<script>

let userId = null;

function getUserId() {
    if (userId !== null) return userId;

    let saved = localStorage.getItem('userId');

    if (!saved) {
        saved = sessionStorage.getItem('userId');
    }

    if (saved) {
        userId = Number(saved);
        return userId;
    }

    return null;
}

let chart;
let monthlyChart;
let categoryColors = {}; 

async function addExpense() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;
    const desc = document.getElementById('desc').value;

    if (isNaN(amount) || amount <= 0) {
        alert("Wprowadż prawidłową kwotę");
        return;
    }

    if (!date) {
        alert("Wybierz datę");
        return;
    }

    if (!desc.trim()) {
        alert("Wpisz opis");
        return;
    }

    await fetch('/expenses', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: date,
            description: desc,
            category_id: document.getElementById('category').value,
            user_id: getUserId()
        })
    });
    await loadExpenses();
    await loadChart();
    await loadMonthlyChart();
    await loadBudget();
}

async function editExpense(id, categoryId) {

    if (!getUserId()) return; 

    const newAmount = prompt("Nowa kwota:");
    const newDesc = prompt("Nowy opis:");

    const amount = parseFloat(newAmount);

    if (isNaN(amount) || amount <= 0) {
        alert("Wpisz poprawną kwotę");
        return;
    }

    if (!newDesc || !newDesc.trim()) {
        alert("Wprowadż opis");
        return;
    }

    await fetch(`/expenses/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: new Date().toISOString().split('T')[0],
            description: newDesc,
            category_id: categoryId,
            user_id: getUserId()
        })
    });

    await loadExpenses();
    await loadChart();
    await loadMonthlyChart();
}

async function loadExpenses() {
    if (!getUserId()) return;

    const list = document.getElementById('list');

    list.classList.remove('show'); 

    const res = await fetch(`/expenses/user/${getUserId()}`);
    const data = await res.json();

    setTimeout(() => {
        list.innerHTML = '';

        data.forEach(e => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${e.date}</td>
                <td style="max-width:200px; word-wrap:break-word;">${e.description}</td>
                <td>${e.amount} zł</td>
                <td>
                    <div style="
                        width:14px;
                        height:14px;
                        background:${categoryColors[e.category_name] || '#ccc'};
                        border-radius:50%;
                        margin:auto;
                    "></div>
                </td>
                <td>
                    <button onclick="editExpense(${e.id}, ${e.category_id})">✏️</button>
                    <button onclick="deleteExpense(${e.id})">❌</button>
                </td>
            `;
            // console.log(e.category_name);
            // console.log(categoryColors);

            list.appendChild(row);
        });

        list.classList.add('show');
    }, 200);
}


async function deleteExpense(id) {
    await fetch(`/expenses/${id}`, {
        method: 'DELETE'
    });
    await loadExpenses();
    await loadChart();
    await loadMonthlyChart();
}

function generateColors(count) {
    const colors = [];

    for (let i = 0; i < count; i++) {
        const hue = Math.floor(360 * i / count);
        colors.push(`hsl(${hue}, 70%, 60%)`);
    }

    return colors;
}

async function loadChart() {
    if (!getUserId()) return;

    const res = await fetch(`/stats/by-category/${getUserId()}`);
    const data = await res.json();

    console.log("CHART DATA:", data); 

    const labels = data.map(d => d.name);
    const values = data.map(d => d.total);
    

    if (chart) {
        chart.destroy();
    }

    const ctx = document.getElementById('chart').getContext('2d');

    const colors = generateColors(values.length);

    categoryColors = {};
    labels.forEach((label, index) => {
        categoryColors[label] = colors[index];
    });

    console.log("COLORS:", categoryColors);

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors
            }]
        }
    });
}

async function setBudget() {
    if (!getUserId()) return; 

    const limit = document.getElementById('budget').value;

    if (!limit || isNaN(limit) || limit <= 0) {
        alert("Wprowadż proszę prawidłowy limit");
        return;
    }

    await fetch('/budget', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            user_id: getUserId(),
            month: '2026-04',
            limit_amount: limit
        })
    });

    await loadBudget();
}

async function loadBudget() {
    if (!getUserId()) return;

    const res = await fetch(`/budget/${getUserId()}/2026-04`);
    const data = await res.json();

    if (data.remaining === null) {
        document.getElementById('budgetInfo').innerText = '';
        return;
    }

    let text = `Zostało: ${data.remaining} zł`;

    if (data.exceeded) {
        text += " ⚠️ Budget przekroczony!";
        document.getElementById('budgetInfo').style.color = 'red';
    } else {
        document.getElementById('budgetInfo').style.color = 'green';
    }

    document.getElementById('budgetInfo').innerText = text;
}

async function loadCategories() {
    if (!getUserId()) return;

    const res = await fetch(`/categories/${getUserId()}`);
    const data = await res.json();

    const select = document.getElementById('category');
    const list = document.getElementById('categoryList');

    select.innerHTML = '';
    list.innerHTML = '';

    data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.text = c.name;
        select.appendChild(option);

        const li = document.createElement('div');
        li.className = 'category-item';

        li.innerHTML = `
            <span>${c.name}</span>
            <button class="delete-btn" onclick="deleteCategory(${c.id})">🗑️</button>
        `;
        list.appendChild(li);
    });
}

async function loadMonthlyStats() {
    if (!getUserId()) return;

    const month = document.getElementById('month').value;

    const res = await fetch(`/stats/monthly/${getUserId()}/${month}`);
    const data = await res.json();

    document.getElementById('monthlyResult').innerText =
        `Za miesiąc: ${data.total} zł`;
}

async function addCategory() {
    if (!getUserId()) return;
    const name = document.getElementById('newCategory').value;

    await fetch('/categories', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: name,
            user_id: getUserId()
        })
    });

    await loadCategories();
    await loadChart();
}

async function deleteCategory(id) {
    if (!getUserId()) return;

    await fetch(`/categories/${id}`, {
        method: 'DELETE'
    });

    await loadCategories();
    await loadChart();
}

async function loadMonthlyChart() {
    if (!getUserId()) return;

    const res = await fetch(`/stats/monthly-comparison/${getUserId()}`);
    const data = await res.json();

    const labels = data.map(d => d.month);
    const values = data.map(d => d.total);

    if (monthlyChart) {
        monthlyChart.destroy();
    }

    const ctx = document.getElementById('monthlyChart').getContext('2d');

    monthlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Wydatki według miesiąca',
                data: values
            }]
        }
    });
}

async function register() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !email.includes('@')) {
        alert("Wprowadż pproszę prawidłowy email");
        return;
    }

    if (!password || password.length < 3) {
        alert("Hasło za  krótkie");
        return;
    }

    const res = await fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.error || "Bład rejestracji");
        return;
    }

    userId = Number(data.userId);
    localStorage.setItem('userId', userId);

    afterLogin();
}

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;   

    const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.error || "Bład wejścia");
        return;
    }

    userId = Number(data.userId);

    if (remember) {
        localStorage.setItem('userId', userId);
        sessionStorage.removeItem('userId');                    
    } else {
        sessionStorage.setItem('userId', userId);
        localStorage.removeItem('userId');
    }

    afterLogin();
}

function showAuth() {
    document.getElementById('authWrapper').style.display = 'flex';
    document.getElementById('appBlock').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'none';
}

function showApp() {
    document.getElementById('authWrapper').style.display = 'none';
    document.getElementById('appBlock').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'block';
}

function logout() {
    userId = null;
    localStorage.removeItem('userId');
    showAuth();
}

async function afterLogin() {
    showApp();
    await refreshAll();
}

async function refreshAll() {
    if (!getUserId()) return;

    await loadChart();
    await loadMonthlyChart();
    await loadExpenses();
    await loadBudget();
    await loadCategories();
}

// const savedUser = localStorage.getItem('userId');
const savedUser =                                                         
    localStorage.getItem('userId') ||
    sessionStorage.getItem('userId');

if (savedUser) {
    userId = Number(savedUser);
    afterLogin();
} else {
    document.getElementById('authWrapper').style.display = 'flex';
    document.getElementById('appBlock').style.display = 'none';
}

if (savedUser) {
    userId = Number(savedUser);
    afterLogin();
} else {
    document.getElementById('authBlock').style.display = 'block';
    document.getElementById('appBlock').style.display = 'none';
}

</script>

</body>
</html>
