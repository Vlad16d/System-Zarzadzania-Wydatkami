<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.expense {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

table {
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: left;
}

tr {
    border-bottom: 1px solid #eee;
}

.category-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;          /* было 8 → стало компактнее */
    font-size: 14px;         /* чуть меньше текст */
    border-bottom: 1px solid #eee;
}

.delete-btn {
/*    background: #ff7474;*/
    background: #FFEFD5;
/*    background: #ffe485; */
    border: none;
    color: white;
    padding: 2px 6px;       /* было больше */
    font-size: 12px;        /* меньше текст */
    border-radius: 4px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #e60000;
}

#categoryList {
    max-width: 300px;
}

</style>
</head>

<body>

<div class="container">

<h1>💸 Expense Tracker</h1>

<div class="card">
<h2>Добавить расход</h2>
<input id="amount" type="number" placeholder="Сумма" min="0" step="0.01">
<input id="date" type="date">
<input id="desc" placeholder="Описание">
<select id="category"></select>
<button onclick="addExpense()">Добавить</button>
</div>

<div class="card">
<h2>Категории</h2>

<input id="newCategory" placeholder="Новая категория...">
<button onclick="addCategory()">Добавить</button>

<ul id="categoryList"></ul>
</div>

<div class="card">
<h2>Список расходов</h2>
<button onclick="loadExpenses()">Обновить</button>
<table border="1" width="100%" id="table">
    <thead>
        <tr>
            <th>Дата</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Категория</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h2>📊 Статистика</h2>
<canvas id="chart"></canvas>
<canvas id="monthlyChart" style="margin-top:20px"></canvas>
<input type="month" id="month">
<button onclick="loadMonthlyStats()">Показать за месяц</button>
<p id="monthlyResult"></p>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>💰 Бюджет</h2>
<input id="budget" placeholder="Лимит">
<button onclick="setBudget()">Установить</button>
<p id="budgetInfo"></p>
</div>

</div>

<script>

const userId = 1;
let chart;
let monthlyChart;
let categoryColors = {}; // 👈 добавили

// ➕ добавить
async function addExpense() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;
    const desc = document.getElementById('desc').value;

    // ❗ ВАЛИДАЦИЯ
    if (isNaN(amount) || amount <= 0) {
        alert("Введите корректную сумму");
        return;
    }

    if (!date) {
        alert("Выберите дату");
        return;
    }

    if (!desc.trim()) {
        alert("Введите описание");
        return;
    }

    await fetch('http://localhost:3000/expenses', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: date,
            description: desc,
            category_id: document.getElementById('category').value,
            user_id: userId
        })
    });
    await loadChart();
    loadMonthlyChart();

    loadChart().then(() => loadExpenses());
}

async function editExpense(id, categoryId) {
    const newAmount = prompt("Новая сумма:");
    const newDesc = prompt("Новое описание:");

    const amount = parseFloat(newAmount);

    if (isNaN(amount) || amount <= 0) {
        alert("Введите корректную сумму");
        return;
    }

    if (!newDesc || !newDesc.trim()) {
        alert("Введите описание");
        return;
    }

    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: new Date().toISOString().split('T')[0],
            description: newDesc,
            category_id: categoryId // 👈 сохраняем!
        })
    });

    await loadChart();
    loadMonthlyChart();
    loadExpenses();
}

// 📄 список
async function loadExpenses() {
    const res = await fetch(`http://localhost:3000/expenses/user/${userId}`);
    const data = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(e => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${e.date}</td>

            <td style="max-width:200px; word-wrap:break-word;">
                ${e.description}
            </td>

            <td>${e.amount} zł</td>

            <td>
                <div style="
                    width:14px;
                    height:14px;
                    background:${categoryColors[e.category_name] || '#ccc'};
                    border-radius:50%;
                    margin:auto;
                "></div>
            </td>

            <td>
                <button onclick="editExpense(${e.id}, ${e.category_id})">✏️</button>
                <button onclick="deleteExpense(${e.id})">❌</button>
            </td>
        `;
        // console.log(e.category_name);
        // console.log(categoryColors);

        list.appendChild(row);
    });

    await loadChart();
    loadMonthlyChart();
}

async function deleteExpense(id) {
    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'DELETE'
    });

    loadExpenses();
    await loadChart();
    loadMonthlyChart();
    loadBudget();
}

function generateColors(count) {
    const colors = [];

    for (let i = 0; i < count; i++) {
        const hue = Math.floor(360 * i / count);
        colors.push(`hsl(${hue}, 70%, 60%)`);
    }

    return colors;
}

async function loadChart() {
    const res = await fetch(`http://localhost:3000/stats/by-category/${userId}`);
    const data = await res.json();

    console.log("CHART DATA:", data); // 👈 важно

    const labels = data.map(d => d.name);
    const values = data.map(d => d.total);
    

    if (chart) {
        chart.destroy();
    }

    const ctx = document.getElementById('chart').getContext('2d');

    const colors = generateColors(values.length);

    categoryColors = {};
    labels.forEach((label, index) => {
        categoryColors[label] = colors[index];
    });

    console.log("COLORS:", categoryColors);

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors
            }]
        }
    });
}

async function setBudget() {
    const limit = document.getElementById('budget').value;
 
    await fetch('http://localhost:3000/budget', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            user_id: userId,
            month: '2026-04',
            limit_amount: limit
        })
    });

    loadBudget();
}

async function loadBudget() {
    const res = await fetch(`http://localhost:3000/budget/${userId}/2026-04`);
    const data = await res.json();

    let text = `Осталось: ${data.remaining} zł`;

    if (data.exceeded) {
        text += " ⚠️ Ты превысил бюджет!";
        document.getElementById('budgetInfo').style.color = 'red';
    } else {
        document.getElementById('budgetInfo').style.color = 'green';
    }

    document.getElementById('budgetInfo').innerText = text;
}

async function loadCategories() {
    const res = await fetch(`http://localhost:3000/categories/${userId}`);
    const data = await res.json();

    const select = document.getElementById('category');
    const list = document.getElementById('categoryList');

    select.innerHTML = '';
    list.innerHTML = '';

    data.forEach(c => {
        // 👉 dropdown
        const option = document.createElement('option');
        option.value = c.id;
        option.text = c.name;
        select.appendChild(option);

        // 👉 список категорий
        const li = document.createElement('div');
        li.className = 'category-item';

        li.innerHTML = `
            <span>${c.name}</span>
            <button class="delete-btn" onclick="deleteCategory(${c.id})">🗑️</button>
        `;
        list.appendChild(li);
    });
}

async function loadMonthlyStats() {
    const month = document.getElementById('month').value;

    const res = await fetch(`http://localhost:3000/stats/monthly/${userId}/${month}`);
    const data = await res.json();

    document.getElementById('monthlyResult').innerText =
        `За месяц: ${data.total} zł`;
}

async function loadMonthlyChart() {
    const res = await fetch(`http://localhost:3000/stats/monthly-comparison/${userId}`);
    const data = await res.json();

    const labels = data.map(d => d.month);
    const values = data.map(d => d.total);

    if (chart) chart.destroy();

    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
}

async function addCategory() {
    const name = document.getElementById('newCategory').value;

    await fetch('http://localhost:3000/categories', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: name,
            user_id: userId
        })
    });

    loadCategories();
}

async function deleteCategory(id) {
    await fetch(`http://localhost:3000/categories/${id}`, {
        method: 'DELETE'
    });

    loadCategories();
}

async function loadMonthlyChart() {
    const res = await fetch(`http://localhost:3000/stats/monthly-comparison/${userId}`);
    const data = await res.json();

    const labels = data.map(d => d.month);
    const values = data.map(d => d.total);

    if (monthlyChart) {
        monthlyChart.destroy();
    }

    const ctx = document.getElementById('monthlyChart').getContext('2d');

    monthlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Расходы по месяцам',
                data: values
            }]
        }
    });
}

// автозагрузка
loadChart().then(() => {
    loadExpenses();
});

loadBudget();
loadCategories();

</script>

</body>
</html>
