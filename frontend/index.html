<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.expense {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

table {
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: left;
}

tr {
    border-bottom: 1px solid #eee;
}

.category-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;          /* было 8 → стало компактнее */
    font-size: 14px;         /* чуть меньше текст */
    border-bottom: 1px solid #eee;
}

.delete-btn {
/*    background: #ff7474;*/
    background: #FFEFD5;
/*    background: #ffe485; */
    border: none;
    color: white;
    padding: 2px 6px;       /* было больше */
    font-size: 12px;        /* меньше текст */
    border-radius: 4px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #e60000;
}

#categoryList {
    max-width: 300px;
}

.fade {
    opacity: 0;
    transition: opacity 0.3s ease;
}

.fade.show {
    opacity: 1;
}

#logoutBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff5c5c;
}

#authWrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    background: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f') no-repeat center center;
    background-size: cover;
}

#authWrapper::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

#authBlock {
    width: 320px;
    text-align: center;
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
}

#authBlock input {
    width: 90%;
}

#authBlock button {
    width: 90%;
    margin-top: 10px;
}

#authBlock button:nth-child(6) {
    background: #3498db;
}

#authBlock button:nth-child(7) {
    background: #9b59b6;
}


#appTitle {
    position: absolute;
    top: 80px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 28px;
    font-weight: bold;
        letter-spacing: 1px;
}

</style>

<div id="authWrapper">
    <h1 id="appTitle">💸 Expense Tracker</h1>
    <div class="card" id="authBlock">
        <h2>🔐 Вход / Регистрация</h2>

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Пароль">

        <label>
            <input type="checkbox" id="remember"> Запомнить меня
        </label>

        <br><br>

        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
    </div>
</div>

<div id="appBlock" style="display:none;">
    <div class="container">

    <h1>💸 Expense Tracker</h1>

    <div class="card">
    <h2>Добавить расход</h2>
    <input id="amount" type="number" placeholder="Сумма" min="0" step="0.01">
    <input id="date" type="date">
    <input id="desc" placeholder="Описание">
    <select id="category"></select>
    <button onclick="addExpense()">Добавить</button>
    </div>

    <div class="card">
    <h2>Категории</h2>

    <input id="newCategory" placeholder="Новая категория...">
    <button onclick="addCategory()">Добавить</button>

    <ul id="categoryList"></ul>
    </div>

    <div class="card">
    <h2>Список расходов</h2>
    <button onclick="loadExpenses()">Обновить</button>
    <table border="1" width="100%" id="table">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Описание</th>
                <th>Сумма</th>
                <th>Категория</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
    </div>

    <div class="card">
    <h2>📊 Статистика</h2>
    <canvas id="chart"></canvas>
    <canvas id="monthlyChart" style="margin-top:20px"></canvas>
    <input type="month" id="month">
    <button onclick="loadMonthlyStats()">Показать за месяц</button>
    <p id="monthlyResult"></p>
    </div>

    <div class="card">
    <h2>💰 Бюджет</h2>
    <input id="budget" placeholder="Лимит">
    <button onclick="setBudget()">Установить</button>
    <p id="budgetInfo"></p>
    </div>

    <button id="logoutBtn" onclick="logout()" style="display:none;">
        Выйти
    </button>

    </div>
</div>

<script>

let userId = null;

function getUserId() {
    if (userId !== null) return userId;

    const saved = localStorage.getItem('userId');

    if (saved) {
        userId = Number(saved);
        return userId;
    }

    return null;
}

let chart;
let monthlyChart;
let categoryColors = {}; // 👈 добавили

// ➕ добавить
async function addExpense() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;
    const desc = document.getElementById('desc').value;

    // ❗ ВАЛИДАЦИЯ
    if (isNaN(amount) || amount <= 0) {
        alert("Введите корректную сумму");
        return;
    }

    if (!date) {
        alert("Выберите дату");
        return;
    }

    if (!desc.trim()) {
        alert("Введите описание");
        return;
    }

    await fetch('http://localhost:3000/expenses', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: date,
            description: desc,
            category_id: document.getElementById('category').value,
            user_id: getUserId()
        })
    });
    await loadExpenses();
    await loadChart();
    await loadBudget();
}

async function editExpense(id, categoryId) {

    if (!getUserId()) return; // 👈 защита

    const newAmount = prompt("Новая сумма:");
    const newDesc = prompt("Новое описание:");

    const amount = parseFloat(newAmount);

    if (isNaN(amount) || amount <= 0) {
        alert("Введите корректную сумму");
        return;
    }

    if (!newDesc || !newDesc.trim()) {
        alert("Введите описание");
        return;
    }

    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: amount,
            date: new Date().toISOString().split('T')[0],
            description: newDesc,
            category_id: categoryId,
            user_id: getUserId()
        })
    });

    await loadExpenses();
    await loadChart();
}

// 📄 список
async function loadExpenses() {
    if (!getUserId()) return;

    const list = document.getElementById('list');

    list.classList.remove('show'); // плавно скрываем

    const res = await fetch(`http://localhost:3000/expenses/user/${getUserId()}`);
    const data = await res.json();

    setTimeout(() => {
        list.innerHTML = '';

        data.forEach(e => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${e.date}</td>
                <td style="max-width:200px; word-wrap:break-word;">${e.description}</td>
                <td>${e.amount} zł</td>
                <td>
                    <div style="
                        width:14px;
                        height:14px;
                        background:${categoryColors[e.category_name] || '#ccc'};
                        border-radius:50%;
                        margin:auto;
                    "></div>
                </td>
                <td>
                    <button onclick="editExpense(${e.id}, ${e.category_id})">✏️</button>
                    <button onclick="deleteExpense(${e.id})">❌</button>
                </td>
            `;
            // console.log(e.category_name);
            // console.log(categoryColors);

            list.appendChild(row);
        });

        list.classList.add('show'); // плавно показываем
    }, 200);
}


async function deleteExpense(id) {
    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'DELETE'
    });
    await loadExpenses();
    await loadChart();
}

function generateColors(count) {
    const colors = [];

    for (let i = 0; i < count; i++) {
        const hue = Math.floor(360 * i / count);
        colors.push(`hsl(${hue}, 70%, 60%)`);
    }

    return colors;
}

async function loadChart() {
    if (!getUserId()) return;

    const res = await fetch(`http://localhost:3000/stats/by-category/${getUserId()}`);
    const data = await res.json();

    console.log("CHART DATA:", data); // 👈 важно

    const labels = data.map(d => d.name);
    const values = data.map(d => d.total);
    

    if (chart) {
        chart.destroy();
    }

    const ctx = document.getElementById('chart').getContext('2d');

    const colors = generateColors(values.length);

    categoryColors = {};
    labels.forEach((label, index) => {
        categoryColors[label] = colors[index];
    });

    console.log("COLORS:", categoryColors);

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors
            }]
        }
    });
}

async function setBudget() {
    if (!getUserId()) return; // 👈 ОБЯЗАТЕЛЬНО

    const limit = document.getElementById('budget').value;

    if (!limit || isNaN(limit) || limit <= 0) {
        alert("Введите корректный лимит");
        return;
    }

    await fetch('http://localhost:3000/budget', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            user_id: getUserId(),
            month: '2026-04',
            limit_amount: limit
        })
    });

    await loadBudget();
}

async function loadBudget() {
    if (!getUserId()) return;

    const res = await fetch(`http://localhost:3000/budget/${getUserId()}/2026-04`);
    const data = await res.json();

    let text = `Осталось: ${data.remaining} zł`;

    if (data.exceeded) {
        text += " ⚠️ Ты превысил бюджет!";
        document.getElementById('budgetInfo').style.color = 'red';
    } else {
        document.getElementById('budgetInfo').style.color = 'green';
    }

    document.getElementById('budgetInfo').innerText = text;
}

async function loadCategories() {
    if (!getUserId()) return;

    const res = await fetch(`http://localhost:3000/categories/${getUserId()}`);
    const data = await res.json();

    const select = document.getElementById('category');
    const list = document.getElementById('categoryList');

    select.innerHTML = '';
    list.innerHTML = '';

    data.forEach(c => {
        // 👉 dropdown
        const option = document.createElement('option');
        option.value = c.id;
        option.text = c.name;
        select.appendChild(option);

        // 👉 список категорий
        const li = document.createElement('div');
        li.className = 'category-item';

        li.innerHTML = `
            <span>${c.name}</span>
            <button class="delete-btn" onclick="deleteCategory(${c.id})">🗑️</button>
        `;
        list.appendChild(li);
    });
}

async function loadMonthlyStats() {
    if (!getUserId()) return;

    const month = document.getElementById('month').value;

    const res = await fetch(`http://localhost:3000/stats/monthly/${getUserId()}/${month}`);
    const data = await res.json();

    document.getElementById('monthlyResult').innerText =
        `За месяц: ${data.total} zł`;
}

async function addCategory() {
    if (!getUserId()) return;
    const name = document.getElementById('newCategory').value;

    await fetch('http://localhost:3000/categories', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: name,
            user_id: getUserId()
        })
    });

    await loadCategories();
    await loadChart();
}

async function deleteCategory(id) {
    if (!getUserId()) return;

    await fetch(`http://localhost:3000/categories/${id}`, {
        method: 'DELETE'
    });

    await loadCategories();
    await loadChart();
}

async function loadMonthlyChart() {
    if (!getUserId()) return;

    const res = await fetch(`http://localhost:3000/stats/monthly-comparison/${getUserId()}`);
    const data = await res.json();

    const labels = data.map(d => d.month);
    const values = data.map(d => d.total);

    if (monthlyChart) {
        monthlyChart.destroy();
    }

    const ctx = document.getElementById('monthlyChart').getContext('2d');

    monthlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Расходы по месяцам',
                data: values
            }]
        }
    });
}

async function register() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('http://localhost:3000/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.userId) {
        userId = data.userId;
        afterLogin();
    } else {
        alert(data.error);
    }
}

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('http://localhost:3000/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.error || "Ошибка входа");
        return;
    }

    userId = Number(data.userId);

    // всегда сохраняем (как ты уже решил)
    localStorage.setItem('userId', userId);

    afterLogin();
}

async function afterLogin() {
    document.getElementById('authWrapper').style.display = 'none';
    document.getElementById('authBlock').style.display = 'none';
    document.getElementById('appBlock').style.display = 'block';

    document.getElementById('logoutBtn').style.display = 'block';

    await loadExpenses();
    await loadChart();
    await loadBudget();
    await loadCategories();
}

function logout() {
    localStorage.removeItem('userId');

    document.getElementById('appBlock').style.display = 'none';
    document.getElementById('authWrapper').style.display = 'flex';
    document.getElementById('authBlock').style.display = 'block';

    document.getElementById('logoutBtn').style.display = 'none'; 
}

async function refreshAll() {
    if (!getUserId()) return;

    await loadChart();
    await loadMonthlyChart();
    await loadExpenses();
    await loadBudget();
    await loadCategories();
}

const savedUser = localStorage.getItem('userId');

if (savedUser) {
    userId = Number(savedUser);
    afterLogin();
} else {
    document.getElementById('authBlock').style.display = 'block';
    document.getElementById('appBlock').style.display = 'none';
}


</script>
