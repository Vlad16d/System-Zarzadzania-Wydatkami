<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.expense {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

table {
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: left;
}

tr {
    border-bottom: 1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>💸 Expense Tracker</h1>

<div class="card">
<h2>Добавить расход</h2>
<input id="amount" placeholder="Сумма">
<input id="date" type="date">
<input id="desc" placeholder="Описание">
<select id="category"></select>
<button onclick="addExpense()">Добавить</button>
</div>

<div class="card">
<h2>Список расходов</h2>
<button onclick="loadExpenses()">Обновить</button>
<table border="1" width="100%" id="table">
    <thead>
        <tr>
            <th>Дата</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h2>📊 Статистика</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>💰 Бюджет</h2>
<input id="budget" placeholder="Лимит">
<button onclick="setBudget()">Установить</button>
<p id="budgetInfo"></p>
</div>

</div>

<script>

const userId = 1;
let chart;

// ➕ добавить
async function addExpense() {
    try {
        const res = await fetch('http://localhost:3000/expenses', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                amount: document.getElementById('amount').value,
                date: document.getElementById('date').value,
                description: document.getElementById('desc').value,
                category_id: document.getElementById('category')?.value || null,
                user_id: userId
            })
        });

        const data = await res.json();
        console.log(data);

        loadExpenses();
        loadChart();
        loadCategories();

    } catch (err) {
        console.error(err);
    }
}

async function editExpense(id) {
    const newAmount = prompt("Новая сумма:");
    const newDesc = prompt("Новое описание:");

    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            amount: newAmount,
            date: "2026-04-21",
            description: newDesc,
            category_id: 1
        })
    });

    loadExpenses();
    loadChart();
    loadBudget();
}

// 📄 список
async function loadExpenses() {
    const res = await fetch(`http://localhost:3000/expenses/user/${userId}`);
    const data = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(e => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${e.date}</td>
            <td style="max-width:200px; word-wrap:break-word;">${e.description}</td>
            <td>${e.amount} zł</td>
            <td>
                <button onclick="editExpense(${e.id})">✏️</button>
                <button onclick="deleteExpense(${e.id})">❌</button>
            </td>
        `;

        list.appendChild(row);
    });
}

async function deleteExpense(id) {
    await fetch(`http://localhost:3000/expenses/${id}`, {
        method: 'DELETE'
    });

    loadExpenses();
    loadChart();
    loadBudget();
}

// 📊 график
async function loadChart() {
    const res = await fetch(`http://localhost:3000/stats/by-category/${userId}`);
    const data = await res.json();

    const labels = data.map(d => d.name || 'Без категории');
    const values = data.map(d => d.total);

    if (chart) chart.destroy();

    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#ff6384',
                    '#36a2eb',
                    '#ffce56',
                    '#4caf50',
                    '#9966ff'
                ]
            }]
        }
    });
}

// 💰 бюджет
async function setBudget() {
    const limit = document.getElementById('budget').value;
 
    await fetch('http://localhost:3000/budget', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            user_id: userId,
            month: '2026-04',
            limit_amount: limit
        })
    });

    loadBudget();
}

async function loadBudget() {
    const res = await fetch(`http://localhost:3000/budget/${userId}/2026-04`);
    const data = await res.json();

    let text = `Осталось: ${data.remaining} zł`;

    if (data.exceeded) {
        text += " ⚠️ Ты превысил бюджет!";
        document.getElementById('budgetInfo').style.color = 'red';
    } else {
        document.getElementById('budgetInfo').style.color = 'green';
    }

    document.getElementById('budgetInfo').innerText = text;
}

async function loadCategories() {
    const res = await fetch(`http://localhost:3000/categories/${userId}`);
    const data = await res.json();

    const select = document.getElementById('category');
    select.innerHTML = '';

    data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.text = c.name;
        select.appendChild(option);
    });
}

// автозагрузка
loadExpenses();
loadChart();
loadBudget();
loadCategories();

</script>

</body>
</html>
